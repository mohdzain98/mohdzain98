name: Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          user: mohdzain98

          template: classic
          filename: github-metrics.svg

          base: header, activity, community, repositories, metadata

          plugin_lines: yes
          plugin_followup: yes
